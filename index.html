<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cravings Destiny</title>
<link rel="stylesheet" href="style.css">
</head><body>
<header><h1>CRAVINGS DESTINY</h1><p>Your Satisfaction Is Our Biggest Cravings</p></header>
<section class="hero">
<h2>Order your favourites</h2>
<p>Select multiple items and checkout on WhatsApp.</p>
</section>
<div id="menu"></div>

<div id="cartBar" class="cart-bar hidden">
<div><strong id="cartCount">0</strong> items • ₹<span id="cartTotal">0</span></div>
<button id="openCart">View Cart</button>
</div>

<div id="drawer" class="drawer">
<div class="drawer-content">
<h2>Your Cart</h2>
<div id="cartItems"></div>
<div class="total">Total: ₹<span id="drawerTotal">0</span></div>
<button id="waBtn">Proceed to Order on WhatsApp</button>
<button id="closeCart">Continue Shopping</button>
</div></div>

<script src="script.js"></script>
</body></html>
